<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>우리반 수학 학습지</title>
<style>
  :root{
    --paper:#FAF7F2;
    --paper-line:#E7E0D0;
    --ink:#2B2B2B;
    --muted:#8A8577;
    --teal:#1F6F6F;
    --teal-dark:#154F4F;
    --teal-tint:#E4F0EE;
    --coral:#E8703A;
    --coral-dark:#C85A29;
    --success:#3E8E5A;
    --success-tint:#E7F3EA;
    --danger:#C8493B;
    --white:#FFFFFF;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--paper);
    color:var(--ink);
    overflow:hidden;
    -webkit-tap-highlight-color:transparent;
  }
  #app{position:fixed;inset:0;display:flex;flex-direction:column;}
  .screen{display:none;flex:1;min-height:0;flex-direction:column;}
  .screen.active{display:flex;}

  /* ---------- 공통 헤더(공책 표지 느낌의 상단 띠) ---------- */
  .topbar{
    background:var(--teal);
    color:#fff;
    padding:14px 16px;
    display:flex;align-items:center;gap:10px;
    flex:0 0 auto;
    position:relative;
  }
  .topbar::after{
    content:"";
    position:absolute;left:0;right:0;bottom:-6px;height:6px;
    background-image:radial-gradient(circle,var(--paper) 3px,transparent 3.5px);
    background-size:16px 12px;background-position:8px 0;
  }
  .topbar .title{font-size:17px;font-weight:700;letter-spacing:.2px;flex:1;}
  .topbar button.icon-btn{
    background:rgba(255,255,255,.16);border:none;color:#fff;
    padding:8px 14px;border-radius:10px;font-size:14px;font-weight:600;
    cursor:pointer;
  }
  .topbar button.icon-btn:active{background:rgba(255,255,255,.3);}

  /* ---------- 시작 화면 ---------- */
  #screen-start{align-items:center;justify-content:center;padding:24px;}
  .brand{text-align:center;margin-bottom:36px;}
  .brand .pencil{font-size:44px;}
  .brand h1{font-size:26px;margin:8px 0 4px;color:var(--teal-dark);}
  .brand p{margin:0;color:var(--muted);font-size:14px;}
  .role-cards{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;}
  .role-card{
    width:180px;min-height:180px;
    background:#fff;border:2px solid var(--paper-line);border-radius:20px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
    cursor:pointer;padding:16px;transition:transform .12s, border-color .12s;
  }
  .role-card:active{transform:scale(.96);}
  .role-card .emoji{font-size:40px;}
  .role-card .label{font-size:17px;font-weight:700;color:var(--ink);}
  .role-card.teacher{border-color:var(--teal);}
  .role-card.student{border-color:var(--coral);}

  /* ---------- 공통 카드/버튼 ---------- */
  .panel{padding:18px;overflow-y:auto;flex:1;min-height:0;}
  .card{background:#fff;border:1px solid var(--paper-line);border-radius:16px;padding:18px;margin-bottom:16px;}
  .card h3{margin:0 0 12px;font-size:15px;color:var(--teal-dark);}
  .field-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px;}
  label.small{font-size:13px;color:var(--muted);font-weight:600;}
  input[type=date], input[type=text], input[type=password], textarea{
    font-family:inherit;font-size:15px;padding:10px 12px;border:1.5px solid var(--paper-line);
    border-radius:10px;background:#fff;color:var(--ink);
  }
  textarea{width:100%;resize:vertical;min-height:140px;line-height:1.7;}
  .btn{
    font-family:inherit;font-weight:700;font-size:15px;border:none;border-radius:12px;
    padding:12px 18px;cursor:pointer;color:#fff;background:var(--teal);
  }
  .btn:active{filter:brightness(.9);}
  .btn.coral{background:var(--coral);}
  .btn.ghost{background:transparent;color:var(--teal);border:1.5px solid var(--teal);}
  .btn.danger{background:var(--danger);}
  .btn:disabled{background:#cfcabc;cursor:not-allowed;}
  .btn.block{width:100%;}
  .hint{font-size:12.5px;color:var(--muted);margin-top:6px;line-height:1.5;}
  .status-msg{font-size:13.5px;padding:10px 12px;border-radius:10px;margin-top:10px;display:none;}
  .status-msg.show{display:block;}
  .status-msg.ok{background:var(--success-tint);color:var(--success);}
  .status-msg.err{background:#FBEAE7;color:var(--danger);}

  /* ---------- 선생님 PIN ---------- */
  #screen-pin{align-items:center;justify-content:center;padding:24px;}
  .pin-box{background:#fff;border-radius:20px;padding:28px;width:280px;text-align:center;border:1px solid var(--paper-line);}
  .pin-box input{width:100%;text-align:center;font-size:22px;letter-spacing:6px;margin:14px 0;}

  /* ---------- 탭 ---------- */
  .tabs{display:flex;gap:6px;padding:10px 16px 0;flex:0 0 auto;background:var(--paper);}
  .tab-btn{
    flex:1;padding:10px 8px;border:none;background:#EFE9DA;color:var(--muted);
    border-radius:10px 10px 0 0;font-weight:700;font-size:13.5px;cursor:pointer;
  }
  .tab-btn.active{background:#fff;color:var(--teal-dark);}
  .tab-content{display:none;flex:1;min-height:0;}
  .tab-content.active{display:flex;flex-direction:column;}

  /* 업로드 미리보기 */
  .thumb-list{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;}
  .thumb{
    width:84px;height:110px;border-radius:8px;overflow:hidden;position:relative;
    border:1.5px solid var(--paper-line);background:#f2f0e8;
  }
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .thumb .rm{
    position:absolute;top:2px;right:2px;background:rgba(0,0,0,.55);color:#fff;
    border:none;border-radius:50%;width:20px;height:20px;font-size:12px;line-height:20px;
    text-align:center;padding:0;cursor:pointer;
  }
  .thumb .pg{position:absolute;bottom:2px;left:4px;color:#fff;font-size:10px;background:rgba(0,0,0,.5);
    padding:1px 5px;border-radius:6px;}

  /* 결과 확인 표 */
  .result-grid{display:flex;flex-direction:column;gap:8px;margin-top:6px;}
  .result-row{
    display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--paper-line);
    border-radius:12px;padding:10px 12px;
  }
  .result-row .name{width:88px;font-weight:700;font-size:14px;flex:0 0 auto;}
  .result-row .pages{display:flex;gap:6px;flex-wrap:wrap;flex:1;}
  .mini-thumb{
    width:42px;height:56px;border-radius:6px;overflow:hidden;border:1.5px solid var(--paper-line);
    cursor:pointer;background:#f2f0e8;position:relative;
  }
  .mini-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;}
  .mini-thumb.empty{display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:16px;cursor:default;}
  .badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;flex:0 0 auto;}
  .badge.done{background:var(--success-tint);color:var(--success);}
  .badge.pending{background:#F0EBDC;color:var(--muted);}
  .badge.warn{background:#FBEAE7;color:var(--danger);}
  .badge.wait{background:var(--teal-tint);color:var(--teal-dark);}

  /* ---------- 학생 이름 선택 ---------- */
  #screen-student-select .panel{align-items:stretch;}
  .name-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;}
  .name-btn{
    background:#fff;border:2px solid var(--paper-line);border-radius:14px;padding:16px 8px;
    font-size:15px;font-weight:700;cursor:pointer;color:var(--ink);
  }
  .name-btn.selected{border-color:var(--coral);background:#FFF3EC;color:var(--coral-dark);}

  /* ---------- 학습지 풀이 화면 ---------- */
  #screen-worksheet{background:#EDE7D8;}
  .ws-header{
    flex:0 0 auto;background:var(--teal-dark);color:#fff;
    padding:10px 14px;display:flex;align-items:center;gap:10px;font-size:13.5px;
  }
  .ws-header .who{font-weight:700;font-size:14.5px;}
  .ws-header .pageind{margin-left:auto;background:rgba(255,255,255,.15);padding:4px 10px;border-radius:20px;}
  .board-wrap{
    flex:1;min-height:0;display:flex;align-items:center;justify-content:center;
    padding:10px;overflow:hidden;position:relative;
    background-image:linear-gradient(var(--paper-line) 1px,transparent 1px),linear-gradient(90deg,var(--paper-line) 1px,transparent 1px);
    background-size:26px 26px;background-color:#F3EFE2;
  }
  .board{position:relative;background:#fff;box-shadow:0 4px 18px rgba(0,0,0,.12);border-radius:4px;transform-origin:0 0;}
  .board img{display:block;user-select:none;pointer-events:none;}
  .board img#refLayerImg{position:absolute;top:0;left:0;}
  .board canvas{position:absolute;top:0;left:0;touch-action:none;cursor:crosshair;}
  .zoom-reset-btn{
    position:absolute;top:12px;right:12px;z-index:5;display:none;align-items:center;gap:4px;
    background:rgba(255,255,255,.94);border:1.5px solid var(--paper-line);border-radius:20px;
    padding:8px 14px;font-size:13px;font-weight:700;color:var(--teal-dark);cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
  }
  .toolbar{
    flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:10px 12px;
    background:#fff;border-top:1px solid var(--paper-line);flex-wrap:wrap;
  }
  .swatch{width:30px;height:30px;border-radius:50%;border:3px solid transparent;cursor:pointer;padding:0;}
  .swatch.active{border-color:var(--teal);}
  .tool-btn{
    background:#F0EBDC;border:none;border-radius:10px;padding:9px 12px;font-size:13px;font-weight:700;
    color:var(--ink);cursor:pointer;
  }
  .tool-btn.on{background:var(--teal);color:#fff;}
  .toolbar .spacer{flex:1;}
  .toolbar select{font-family:inherit;font-size:13px;padding:8px 10px;border-radius:10px;border:1.5px solid var(--paper-line);}
  .width-control{display:flex;align-items:center;gap:9px;background:#F0EBDC;border-radius:10px;padding:0 12px;height:38px;}
  .width-control input[type=range]{width:88px;accent-color:var(--teal);cursor:pointer;}
  .width-dot{width:10px;height:10px;border-radius:50%;background:#1a1a1a;flex:0 0 auto;}
  .submit-banner{
    flex:0 0 auto;text-align:center;font-size:13px;padding:6px;color:var(--muted);background:#fff;
  }
  .submit-banner.done{color:var(--success);font-weight:700;}
  .submit-banner.warn{color:var(--danger);font-weight:700;}

  /* ---------- 모달(확대보기) ---------- */
  .modal-bg{
    position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;
    align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .modal-bg.show{display:flex;}
  .modal-box{background:#fff;border-radius:14px;max-width:92vw;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;}
  .modal-box .mhead{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--teal-dark);color:#fff;}
  .modal-box .mhead .spacer{flex:1;}
  .modal-imgwrap{position:relative;display:inline-block;background:#EDE7D8;line-height:0;}
  .modal-imgwrap img{max-width:88vw;max-height:74vh;object-fit:contain;display:block;}
  .modal-imgwrap img#modalImgStrokes,.modal-imgwrap img#modalImgTeacher{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
  .modal-box .mfoot{display:flex;gap:10px;padding:10px 14px;justify-content:center;background:#fff;flex-wrap:wrap;}

  .loading{padding:16px;text-align:center;color:var(--muted);font-size:14px;}
  .empty-note{padding:20px;text-align:center;color:var(--muted);font-size:14px;line-height:1.7;}


  .boot-overlay{position:fixed;inset:0;background:var(--paper);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted);font-size:14px;text-align:center;padding:24px;}
  .boot-overlay.hide{display:none;}
  .spinner{width:34px;height:34px;border:4px solid var(--paper-line);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#D8D2C0;border-radius:8px;}
</style>
</head>
<body>
<div class="boot-overlay" id="bootOverlay">
  <div class="spinner"></div>
  <div>서버에 연결하는 중...</div>
</div>
<div id="app">

  <!-- ===================== 시작 화면 ===================== -->
  <div class="screen active" id="screen-start">
    <div class="panel" style="display:flex;align-items:center;justify-content:center;flex-direction:column;">
      <div class="brand">
        <div class="pencil">✏️📐</div>
        <h1>우리반 수학 학습지</h1>
        <p>디벗으로 바로 풀고 제출하는 학습지</p>
      </div>
      <div class="role-cards">
        <button class="role-card teacher" onclick="goPin()">
          <div class="emoji">🍎</div>
          <div class="label">선생님</div>
        </button>
        <button class="role-card student" onclick="goStudentSelect()">
          <div class="emoji">🧑‍🎓</div>
          <div class="label">학생</div>
        </button>
      </div>
    </div>
  </div>

  <!-- ===================== 선생님 PIN ===================== -->
  <div class="screen" id="screen-pin">
    <div class="topbar"><button class="icon-btn" onclick="goStart()">← 처음</button><div class="title">선생님 확인</div></div>
    <div class="panel" style="display:flex;align-items:center;justify-content:center;">
      <div class="pin-box">
        <div style="font-size:14px;color:var(--muted);">선생님 PIN을 입력하세요</div>
        <input type="password" id="pinInput" inputmode="numeric" maxlength="6" placeholder="••••">
        <button class="btn coral block" onclick="checkPin()">확인</button>
        <div class="status-msg err" id="pinError">PIN이 올바르지 않아요.</div>
      </div>
    </div>
  </div>

  <!-- ===================== 선생님 화면 ===================== -->
  <div class="screen" id="screen-teacher">
    <div class="topbar"><button class="icon-btn" onclick="goStart()">← 처음</button><div class="title">선생님 모드</div></div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="upload" onclick="switchTeacherTab('upload')">📤 학습지 업로드</button>
      <button class="tab-btn" data-tab="results" onclick="switchTeacherTab('results')">📊 제출 확인</button>
      <button class="tab-btn" data-tab="roster" onclick="switchTeacherTab('roster')">👥 학생 명단</button>
    </div>

    <!-- 업로드 탭 -->
    <div class="tab-content active" id="tab-upload">
      <div class="panel">
        <div class="card">
          <h3>날짜 선택</h3>
          <div class="field-row">
            <input type="date" id="uploadDate">
            <button class="btn ghost" onclick="loadExistingWorksheet()">불러오기</button>
          </div>
          <div class="hint" id="uploadExistingNote"></div>
        </div>
        <div class="card">
          <h3>학습지 이미지 (여러 장 가능, 순서대로 등록돼요)</h3>
          <input type="file" id="fileInput" accept="image/*" multiple>
          <div class="thumb-list" id="thumbList"></div>
          <button class="btn coral block" style="margin-top:14px;" onclick="saveWorksheet()">이 학습지로 저장</button>
          <div class="status-msg" id="uploadStatus"></div>
        </div>
      </div>
    </div>

    <!-- 결과확인 탭 -->
    <div class="tab-content" id="tab-results">
      <div class="panel">
        <div class="card">
          <h3>날짜 선택</h3>
          <div class="field-row">
            <input type="date" id="resultDate">
            <button class="btn ghost" onclick="loadResults()">불러오기</button>
          </div>
        </div>
        <div id="resultArea"></div>
      </div>
    </div>

    <!-- 학생명단 탭 -->
    <div class="tab-content" id="tab-roster">
      <div class="panel">
        <div class="card">
          <h3>학생 이름을 한 줄에 한 명씩 입력하세요</h3>
          <textarea id="rosterInput" placeholder="예)&#10;김민준&#10;이서연&#10;박도윤"></textarea>
          <button class="btn coral block" style="margin-top:12px;" onclick="saveRoster()">명단 저장</button>
          <div class="status-msg" id="rosterStatus"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===================== 학생 이름 선택 ===================== -->
  <div class="screen" id="screen-student-select">
    <div class="topbar"><button class="icon-btn" onclick="goStart()">← 처음</button><div class="title">누구인가요?</div></div>
    <div class="panel">
      <div id="nameGridWrap" class="loading">명단을 불러오는 중...</div>
      <button class="btn coral block" style="margin-top:16px;" id="studentGoBtn" disabled onclick="enterWorksheet()">학습지 풀러 가기</button>
    </div>
  </div>

  <!-- ===================== 학습지 풀이 / 채점 화면 ===================== -->
  <div class="screen" id="screen-worksheet">
    <div class="ws-header">
      <button class="icon-btn" style="background:rgba(255,255,255,.16);border:none;color:#fff;padding:6px 12px;border-radius:8px;font-size:12.5px;" onclick="exitWorksheetScreen()">← 나가기</button>
      <div class="who" id="wsWho"></div>
      <div class="pageind" id="wsPageInd"></div>
    </div>
    <div class="board-wrap">
      <button class="zoom-reset-btn" id="zoomResetBtn" onclick="resetZoom()">↺ 원래 크기</button>
      <div class="board" id="board">
        <img id="pageImage" src="" alt="학습지">
        <img id="refLayerImg" alt="" style="display:none;">
        <canvas id="drawCanvas"></canvas>
      </div>
    </div>
    <div class="submit-banner" id="submitBanner">아직 제출 전이에요</div>
    <div class="toolbar">
      <button class="swatch active" id="swatchBlack" style="background:#1a1a1a" onclick="setColor('#1a1a1a',this)"></button>
      <button class="swatch" id="swatchRed" style="background:#e63946" onclick="setColor('#e63946',this)"></button>
      <button class="swatch" id="swatchBlue" style="background:#1d63d1" onclick="setColor('#1d63d1',this)"></button>
      <button class="swatch" id="swatchGreen" style="background:#2e8b57" onclick="setColor('#2e8b57',this)"></button>
      <div class="width-control">
        <span class="width-dot" id="widthDot"></span>
        <input type="range" id="widthSlider" min="2" max="18" step="1" value="6" oninput="setWidth(this.value)">
      </div>
      <button class="tool-btn" id="eraserBtn" onclick="toggleEraser()">🧹 지우개</button>
      <button class="tool-btn" onclick="undoStroke()">↩️ 실행취소</button>
      <button class="tool-btn" onclick="clearPage()">🗑️ 전체지우기</button>
      <div class="spacer"></div>
      <button class="tool-btn grading-only" id="gradeNeedsRevisionBtn" onclick="setGradingStatus('needs_revision')" style="display:none;">🔁 재제출 필요</button>
      <button class="tool-btn grading-only" id="gradeConfirmBtn" onclick="setGradingStatus('confirmed')" style="display:none;">✅ 확인 완료</button>
      <button class="tool-btn" id="prevPageBtn" onclick="changePage(-1)">◀ 이전</button>
      <button class="tool-btn" id="nextPageBtn" onclick="changePage(1)">다음 ▶</button>
      <button class="btn coral" id="submitMainBtn" onclick="submitWork()">✅ 제출하기</button>
    </div>
  </div>

</div>

<!-- 확대보기 모달 -->
<div class="modal-bg" id="modalBg">
  <div class="modal-box">
    <div class="mhead">
      <span id="modalTitle"></span>
      <div class="spacer"></div>
      <button class="icon-btn" onclick="closeModal()">닫기 ✕</button>
    </div>
    <div class="modal-imgwrap">
      <img id="modalImgBase" src="">
      <img id="modalImgStrokes" src="">
      <img id="modalImgTeacher" src="">
    </div>
    <div class="mfoot">
      <button class="tool-btn" id="modalPrev" onclick="modalNav(-1)">◀ 이전 장</button>
      <button class="tool-btn" id="modalNext" onclick="modalNav(1)">다음 장 ▶</button>
      <a class="btn ghost" id="modalDownloadBase" download="학습지_원본.jpg">학습지 저장</a>
      <a class="btn coral" id="modalDownloadStrokes" download="필기.png">필기 저장</a>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

function waitForAuth(){
  return new Promise((resolve, reject)=>{
    if(auth.currentUser){ resolve(auth.currentUser); return; }
    const unsub = auth.onAuthStateChanged(user=>{
      if(user){ unsub(); resolve(user); }
    }, reject);
  });
}
async function bootApp(){
  try{
    await auth.signInAnonymously();
    await waitForAuth();
    document.getElementById('bootOverlay').classList.add('hide');
  }catch(e){
    console.error('Firebase 연결 실패', e);
    document.getElementById('bootOverlay').innerHTML =
      '<div class="spinner" style="display:none;"></div>'+
      '<div>서버 연결에 실패했어요.<br>firebaseConfig 값과, Firebase 콘솔의 Authentication에서<br>"익명" 로그인이 켜져 있는지 확인해주세요.</div>';

}

/* ============================================================
   유틸: 날짜, 키 정리, Firestore/Storage 래퍼
============================================================ */
function todayStr(){
  return new Date().toLocaleDateString('en-CA', {timeZone:'Asia/Seoul'});
}
function sanitizeKeyPart(s){
  return String(s).trim().replace(/[\s/\\'".#$\[\]]+/g,'_');
}
async function fsGetDoc(col, id){
  try{
    const snap = await db.collection(col).doc(id).get();
    return snap.exists ? snap.data() : null;
  }catch(e){
    console.error('불러오기 실패', col, id, e);
    return null;
  }
}
async function fsSetDoc(col, id, data, merge){
  try{
    await db.collection(col).doc(id).set(data, merge ? {merge:true} : {});
    return true;
  }catch(e){
    console.error('저장 실패', col, id, e);
    return false;
  }
}
async function uploadDataUrl(path, dataUrl){
  const blob = await (await fetch(dataUrl)).blob();
  const ref = fbStorage.ref().child(path);
  await ref.put(blob);
  return await ref.getDownloadURL();
}
async function downloadAsBlobUrl(url){
  const resp = await fetch(url);
  const blob = await resp.blob();
  return URL.createObjectURL(blob);
}

let pendingPages = []; // dataURL(신규) 또는 이미 업로드된 다운로드 URL(기존) 배열

function canvasToDataUrlAdaptive(canvas){
  let q = JPEG_QUALITY;
  let url = canvas.toDataURL('image/jpeg', q);
  while((url.length * 0.75) > PAGE_TARGET_BYTES && q > 0.55){
    q -= 0.08;
    url = canvas.toDataURL('image/jpeg', q);
  }
  return url;
}

function resizeImageFile(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onerror = ()=>reject(new Error('파일을 읽지 못했어요'));
    reader.onload = ()=>{
      const img = new Image();
      img.onerror = ()=>reject(new Error('이미지를 열지 못했어요'));
      img.onload = ()=>{
        let w = img.naturalWidth, h = img.naturalHeight;
        const scale = Math.min(1, MAX_IMG_DIM / Math.max(w,h));
        w = Math.round(w*scale); h = Math.round(h*scale);
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        const ctx = c.getContext('2d');
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.fillStyle = '#fff';
        ctx.fillRect(0,0,w,h);
        ctx.drawImage(img,0,0,w,h);
        resolve(canvasToDataUrlAdaptive(c));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

async function onFilesSelected(e){
  const files = Array.from(e.target.files || []);
  if(files.length===0) return;
  const statusEl = document.getElementById('uploadStatus');
  statusEl.className = 'status-msg show';
  statusEl.textContent = '이미지 처리 중...';
  for(const f of files){
    try{
      const dataUrl = await resizeImageFile(f);
      pendingPages.push(dataUrl);
    }catch(err){
      console.error(err);
    }
  }
  renderThumbs();
  statusEl.classList.remove('show');
  e.target.value = '';
}

function renderThumbs(){
  const wrap = document.getElementById('thumbList');
  wrap.innerHTML = '';
  pendingPages.forEach((src, i)=>{
    const d = document.createElement('div');
    d.className = 'thumb';
    d.innerHTML = `<img src="${src}"><span class="pg">${i+1}</span><button class="rm" onclick="removePendingPage(${i})">✕</button>`;
    wrap.appendChild(d);
  });
}
function removePendingPage(i){
  pendingPages.splice(i,1);
  renderThumbs();
}

async function loadExistingWorksheet(){
  const date = document.getElementById('uploadDate').value || todayStr();
  const note = document.getElementById('uploadExistingNote');
  note.textContent = '불러오는 중...';
  const ws = await fsGetDoc('worksheets', date);
  if(ws && ws.pageUrls && ws.pageUrls.length){
    pendingPages = ws.pageUrls.slice();
    note.textContent = `${date}에 이미 등록된 학습지 ${ws.pageUrls.length}장을 불러왔어요. 수정 후 다시 저장하면 덮어써요.`;
  }else{
    pendingPages = [];
    note.textContent = `${date}에는 아직 등록된 학습지가 없어요. 새로 만들어보세요.`;
  }
  renderThumbs();
}

async function saveWorksheet(){
  const date = document.getElementById('uploadDate').value || todayStr();
  const statusEl = document.getElementById('uploadStatus');
  if(pendingPages.length===0){
    statusEl.className = 'status-msg show err';
    statusEl.textContent = '이미지를 먼저 추가해주세요.';
    return;
  }
  statusEl.className = 'status-msg show';
  statusEl.textContent = `저장 중... (0/${pendingPages.length})`;
  try{
    const urls = [];
    for(let i=0;i<pendingPages.length;i++){
      const p = pendingPages[i];
      if(p.startsWith('data:')){
        const url = await uploadDataUrl(`worksheets/${date}/page${i}_${Date.now()}.jpg`, p);
        urls.push(url);
      }else{
        urls.push(p);
      }
      statusEl.textContent = `저장 중... (${i+1}/${pendingPages.length})`;
    }
    const ok = await fsSetDoc('worksheets', date, {pageUrls:urls, pageCount:urls.length, updatedAt:new Date().toISOString()});
    statusEl.className = 'status-msg show ' + (ok?'ok':'err');
    statusEl.textContent = ok ? `저장 완료! ${date} 학습지 ${urls.length}장이 등록됐어요.` : '저장에 실패했어요. 다시 시도해주세요.';
  }catch(err){
    console.error(err);
    statusEl.className = 'status-msg show err';
    statusEl.textContent = '업로드 중 오류가 발생했어요. 인터넷 연결을 확인해주세요.';
  }
}

async function loadResults(){
  const date = document.getElementById('resultDate').value || todayStr();
  const area = document.getElementById('resultArea');
  area.innerHTML = '<div class="loading">불러오는 중...</div>';

  const rosterData = await fsGetDoc('roster','list');
  const roster = (rosterData && rosterData.names) || [];
  if(roster.length===0){
    area.innerHTML = '<div class="empty-note">등록된 학생 명단이 없어요. "학생 명단" 탭에서 먼저 등록해주세요.</div>';
    return;
  }
  const ws = await fsGetDoc('worksheets', date);
  const pageCount = ws && ws.pageUrls ? ws.pageUrls.length : 0;

  const subs = {};
  await Promise.all(roster.map(async name=>{
    subs[name] = await fsGetDoc('submissions', date+'_'+sanitizeKeyPart(name));
  }));

  currentResultsDate = date;
  currentResultsSubs = subs;

  const submitted = roster.filter(name => subs[name] && subs[name].submitted);
  const unsubmitted = roster.filter(name => !(subs[name] && subs[name].submitted));

  area.innerHTML = '';

  const summaryCard = document.createElement('div');
  summaryCard.className = 'card';
  summaryCard.innerHTML = `
    <h3>제출 현황 (${submitted.length}/${roster.length}명 제출)</h3>
    <div class="status-msg show ok">✅ 제출완료 ${submitted.length}명${submitted.length ? ' — ' + submitted.map(n=>`<b>${n}</b>`).join(', ') : ''}</div>
    <div class="status-msg show ${unsubmitted.length ? 'err' : 'ok'}" style="margin-top:8px;">${unsubmitted.length ? `⏳ 미제출 ${unsubmitted.length}명 — ` + unsubmitted.map(n=>`<b>${n}</b>`).join(', ') : '🎉 미제출 학생 없음'}</div>
  `;
  area.appendChild(summaryCard);

  if(pageCount===0){
    const note = document.createElement('div');
    note.className = 'empty-note';
    note.innerHTML = `${date}에 등록된 학습지가 없어요.<br>제출 여부만 아래에서 확인할 수 있어요.`;
    area.appendChild(note);
  }

  const gridWrap = document.createElement('div');
  gridWrap.className = 'result-grid';
  roster.forEach(name=>{
    const sub = subs[name];
    const row = document.createElement('div');
    row.className = 'result-row';
    const pagesHtml = [];
    const total = pageCount || (sub && sub.strokePages ? Object.keys(sub.strokePages).length : 0);
    for(let i=0;i<total;i++){
      const strokeSrc = sub && sub.strokePages && sub.strokePages[i];
      const baseSrc = (sub && sub.basePages && sub.basePages[i]) || (ws && ws.pageUrls && ws.pageUrls[i]) || '';
      if(strokeSrc){
        pagesHtml.push(`<div class="mini-thumb" onclick='openModalFromResults(${JSON.stringify(name)},${i})'><img src="${baseSrc}" loading="lazy"><img src="${strokeSrc}" loading="lazy"></div>`);
      }else{
        pagesHtml.push(`<div class="mini-thumb empty">–</div>`);
      }
    }
    row.innerHTML = `
      <div class="name">${name}</div>
      <div class="pages">${pagesHtml.join('') || '<span class="hint">해당 없음</span>'}</div>
      ${statusBadgeHtml(sub)}
      ${sub && sub.submitted ? `<button class="tool-btn" style="flex:0 0 auto;" onclick='enterGradingFromResults(${JSON.stringify(name)})'>✏️ 채점</button>` : ''}
    `;
    gridWrap.appendChild(row);
  });
  area.appendChild(gridWrap);
}

function statusBadgeHtml(sub){
  if(!sub || !sub.submitted) return `<div class="badge pending">미제출</div>`;
  if(sub.status==='needs_revision') return `<div class="badge warn">재제출 필요</div>`;
  if(sub.status==='confirmed') return `<div class="badge done">확인 완료</div>`;
  return `<div class="badge wait">채점 대기</div>`;
}

let currentResultsDate = null;
let currentResultsSubs = null;
let modalPages = []; // [{base, strokes}, ...]
let modalIndex = 0;

function openModalFromResults(name, pageIndex){
  const sub = currentResultsSubs[name];
  if(!sub || !sub.strokePages) return;
  const sortedKeys = Object.keys(sub.strokePages).sort((a,b)=>a-b);
  modalPages = sortedKeys.map(k=>({
    base: (sub.basePages && sub.basePages[k]) || '',
    strokes: sub.strokePages[k],
    teacher: (sub.teacherStrokePages && sub.teacherStrokePages[k]) || ''
  }));
  modalIndex = sortedKeys.indexOf(String(pageIndex));
  document.getElementById('modalTitle').textContent = `${name} — ${currentResultsDate}`;
  renderModal();
  document.getElementById('modalBg').classList.add('show');
}
async function setDownloadLink(el, url, filename){
  if(!url){ el.style.display='none'; return; }
  el.style.display='';
  el.href = url; // 우선 원본 URL로 연결(즉시 열람 가능하게)
  el.removeAttribute('download');
  try{
    const blobUrl = await downloadAsBlobUrl(url);
    el.href = blobUrl;
    el.download = filename;
  }catch(e){ /* 실패 시 원본 URL로 새 탭에서 열람 */ el.target = '_blank'; }
}
async function renderModal(){
  const p = modalPages[modalIndex];
  document.getElementById('modalImgBase').src = p.base;
  document.getElementById('modalImgStrokes').src = p.strokes;
  document.getElementById('modalImgTeacher').src = p.teacher || '';
  document.getElementById('modalPrev').disabled = modalIndex<=0;
  document.getElementById('modalNext').disabled = modalIndex>=modalPages.length-1;
  setDownloadLink(document.getElementById('modalDownloadBase'), p.base, '학습지_원본.jpg');
  setDownloadLink(document.getElementById('modalDownloadStrokes'), p.strokes, '필기.png');
}
function modalNav(d){
  modalIndex = Math.max(0, Math.min(modalPages.length-1, modalIndex+d));
  renderModal();
}
function closeModal(){
  document.getElementById('modalBg').classList.remove('show');
}
function enterGradingFromResults(name){
  closeModal();
  showScreen('screen-teacher'); // 임시로 유지, enterGrading에서 바로 덮어씀
  enterGrading(currentResultsDate, name);
}

function setActiveSwatchUI(color){
  const map = {'#1a1a1a':'swatchBlack','#e63946':'swatchRed','#1d63d1':'swatchBlue','#2e8b57':'swatchGreen'};
  document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));
  const el = document.getElementById(map[color]);
  if(el) el.classList.add('active');
  const dot = document.getElementById('widthDot');
  if(dot) dot.style.background = color;
}

function roundStrokes(strokes){
  return (strokes||[]).map(s=>({
    mode: s.mode, color: s.color, width: s.width,
    points: s.points.map(p=>({x:Math.round(p.x*10)/10, y:Math.round(p.y*10)/10}))
  }));
}
function loadStrokesFromData(data, pageCount){
  const arr = [];
  for(let i=0;i<pageCount;i++){
    const pageStrokes = (data && data[i]) || [];
    arr.push(pageStrokes.map(s=>({
      mode:s.mode, color:s.color, width:s.width,
      points:(s.points||[]).map(p=>({x:p.x, y:p.y}))
    })));
  }
  return arr;
}

async function enterWorksheet(){
  if(!selectedStudent) return;
  appMode = 'student';
  wsDate = todayStr();
  const ws = await fsGetDoc('worksheets', wsDate);
  if(!ws || !ws.pageUrls || ws.pageUrls.length===0){
    showScreen('screen-worksheet');
    document.getElementById('wsWho').textContent = selectedStudent;
    document.getElementById('board').innerHTML = '<div class="empty-note" style="padding:40px;">오늘(' + wsDate + ') 등록된 학습지가 아직 없어요.<br>선생님이 올려주실 때까지 기다려주세요!</div>';
    document.querySelector('.toolbar').style.display = 'none';
    document.getElementById('submitBanner').style.display = 'none';
    document.getElementById('wsPageInd').textContent = '';
    return;
  }
  document.querySelector('.toolbar').style.display = 'flex';
  document.getElementById('submitBanner').style.display = 'block';
  document.querySelectorAll('.grading-only').forEach(b=>b.style.display='none');
  document.getElementById('submitMainBtn').textContent = '✅ 제출하기';
  document.getElementById('board').innerHTML =
    '<img id="pageImage" src="" alt="학습지"><img id="refLayerImg" alt="" style="display:none;"><canvas id="drawCanvas"></canvas>';

  wsPages = ws.pageUrls;

  const existing = await fsGetDoc('submissions', wsDate+'_'+sanitizeKeyPart(selectedStudent));
  submittedFlag = !!(existing && existing.submitted);
  wsStrokes = (existing && existing.strokeData)
    ? loadStrokesFromData(existing.strokeData, wsPages.length)
    : wsPages.map(()=>[]);
  wsTeacherStrokePages = (existing && existing.teacherStrokePages) || {};
  wsCurrentPage = 0;

  drawColor = '#1a1a1a'; eraserOn = false; drawWidth = 6;
  setActiveSwatchUI(drawColor);
  const widthSlider = document.getElementById('widthSlider');
  if(widthSlider) widthSlider.value = 6;
  setWidth(6);
  document.getElementById('eraserBtn').classList.remove('on');

  document.getElementById('wsWho').textContent = selectedStudent;
  showScreen('screen-worksheet');
  loadPage(0);
  updateSubmitBanner(existing);
}

/* ---------- 선생님: 채점하기 ---------- */
async function enterGrading(date, student){
  const sub = await fsGetDoc('submissions', date+'_'+sanitizeKeyPart(student));
  if(!sub || !sub.submitted){
    alert('아직 제출된 내용이 없어요.');
    return;
  }
  appMode = 'grading';
  gradingDate = date;
  gradingStudent = student;
  gradingBasePages = sub.basePages || [];
  gradingStudentLayerPages = sub.strokePages || {};
  gradingStrokes = loadStrokesFromData(sub.teacherStrokeData, gradingBasePages.length);
  wsCurrentPage = 0;

  document.querySelector('.toolbar').style.display = 'flex';
  document.getElementById('submitBanner').style.display = 'block';
  document.querySelectorAll('.grading-only').forEach(b=>b.style.display='flex');
  document.getElementById('submitMainBtn').textContent = '💾 채점 저장';
  document.getElementById('board').innerHTML =
    '<img id="pageImage" src="" alt="학습지"><img id="refLayerImg" alt="" style="display:none;"><canvas id="drawCanvas"></canvas>';

  drawColor = '#e63946'; eraserOn = false; drawWidth = 6; // 채점은 빨간펜 기본
  setActiveSwatchUI(drawColor);
  const widthSlider = document.getElementById('widthSlider');
  if(widthSlider) widthSlider.value = 6;
  setWidth(6);
  document.getElementById('eraserBtn').classList.remove('on');

  document.getElementById('wsWho').textContent = `${student} 채점 중`;
  showScreen('screen-worksheet');
  loadPage(0);

  const banner = document.getElementById('submitBanner');
  banner.textContent = '학생 필기(검정/색)를 참고해서 빨간펜으로 채점해보세요.';
  banner.classList.remove('done','warn');
}

function exitWorksheetScreen(){
  if(appMode==='grading'){
    appMode = 'student';
    showScreen('screen-teacher');
    switchTeacherTab('results');
    loadResults();
  }else{
    goStudentSelect();
  }
}

/* ---------- 페이지 로딩/이동 ---------- */
function loadPage(idx){
  wsCurrentPage = idx;
  resetZoom(true);
  const img = document.getElementById('pageImage');
  const canvas = document.getElementById('drawCanvas');
  const refImg = document.getElementById('refLayerImg');
  const pages = currentPagesArray();

  img.onload = ()=>{
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    fitBoard();
    redrawStrokes();
    setupCanvasEvents(canvas);
  };
  img.src = pages[idx];

  const refSrc = appMode==='grading'
    ? (gradingStudentLayerPages[idx] || '')
    : (wsTeacherStrokePages[idx] || '');
  if(refImg){
    refImg.src = refSrc || '';
    refImg.style.display = refSrc ? 'block' : 'none';
  }

  document.getElementById('wsPageInd').textContent = `총 ${pages.length}장 중 ${idx+1}번째`;
  document.getElementById('prevPageBtn').disabled = idx<=0;
  document.getElementById('nextPageBtn').disabled = idx>=pages.length-1;
}

function changePage(delta){
  const next = wsCurrentPage + delta;
  const pages = currentPagesArray();
  if(next<0 || next>=pages.length) return;
  loadPage(next);
}

function setColor(c, btnEl){
  drawColor = c; eraserOn = false;
  document.getElementById('eraserBtn').classList.remove('on');
  document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));
  btnEl.classList.add('active');
  const dot = document.getElementById('widthDot');
  if(dot) dot.style.background = c;
}
function setWidth(v){
  drawWidth = parseFloat(v);
  const dot = document.getElementById('widthDot');
  if(dot){
    const size = Math.max(4, Math.min(24, drawWidth * 1.4));
    dot.style.width = size + 'px';
    dot.style.height = size + 'px';
  }
}
function toggleEraser(){
  eraserOn = !eraserOn;
  document.getElementById('eraserBtn').classList.toggle('on', eraserOn);
}

let canvasBound = null;
function setupCanvasEvents(canvas){
  if(canvasBound===canvas) return;
  canvasBound = canvas;
  canvas.addEventListener('pointerdown', onPointerDown);
  canvas.addEventListener('pointermove', onPointerMove);
  canvas.addEventListener('pointerup', onPointerUp);
  canvas.addEventListener('pointercancel', onPointerUp);
  canvas.addEventListener('pointerleave', onPointerUp);
}

function getCanvasPoint(canvas, evt){
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: (evt.clientX - rect.left) * scaleX,
    y: (evt.clientY - rect.top) * scaleY
  };
}

/* ---------- 핀치 확대/축소 ---------- */
function wrapPoint(evt){
  const wrap = document.querySelector('.board-wrap');
  const r = wrap.getBoundingClientRect();
  return {x: evt.clientX - r.left, y: evt.clientY - r.top};
}
function getMidpoint(p1, p2){ return {x:(p1.x+p2.x)/2, y:(p1.y+p2.y)/2}; }
function getDistance(p1, p2){ return Math.hypot(p1.x-p2.x, p1.y-p2.y); }

function applyBoardTransform(){
  const board = document.getElementById('board');
  if(!board) return;
  board.style.transform = `translate(${boardTranslate.x}px, ${boardTranslate.y}px) scale(${boardScale})`;
  const btn = document.getElementById('zoomResetBtn');
  if(btn) btn.style.display = boardScale > 1.02 ? 'flex' : 'none';
}
function clampBoardTranslate(){
  const wrap = document.querySelector('.board-wrap');
  const board = document.getElementById('board');
  if(!wrap || !board) return;
  const wrapW = wrap.clientWidth, wrapH = wrap.clientHeight;
  const boardW = board.offsetWidth * boardScale;
  const boardH = board.offsetHeight * boardScale;
  const minX = Math.min(0, wrapW - boardW);
  const minY = Math.min(0, wrapH - boardH);
  boardTranslate.x = Math.max(minX, Math.min(0, boardTranslate.x));
  boardTranslate.y = Math.max(minY, Math.min(0, boardTranslate.y));
}
function startPinch(){
  const pts = Array.from(activePointers.values());
  if(pts.length < 2) return;
  const [p1, p2] = pts;
  const dist = getDistance(p1, p2);
  const mid = getMidpoint(p1, p2);
  pinchState = {
    startDist: dist || 1,
    startScale: boardScale,
    contentPoint: {
      x: (mid.x - boardTranslate.x) / boardScale,
      y: (mid.y - boardTranslate.y) / boardScale
    }
  };
}
function resetZoom(instant){
  activePointers.clear();
  pinchState = null;
  isZoomGesture = false;
  isDrawing = false;
  currentStroke = null;
  boardScale = 1;
  boardTranslate = {x:0, y:0};
  const board = document.getElementById('board');
  if(!board) return;
  if(instant){
    board.style.transition = 'none';
    applyBoardTransform();
  }else{
    board.style.transition = 'transform .2s ease';
    applyBoardTransform();
    setTimeout(()=>{ board.style.transition = ''; }, 220);
  }
}

/* ---------- 그리기 + 핀치 통합 포인터 처리 ---------- */
function onPointerDown(e){
  const canvas = e.target;
  canvas.setPointerCapture(e.pointerId);
  activePointers.set(e.pointerId, wrapPoint(e));

  if(activePointers.size >= 2){
    if(isDrawing){
      isDrawing = false;
      currentStroke = null;
      redrawStrokes(); // 두 손가락이 닿는 순간 그리던 미완성 선은 취소
    }
    isZoomGesture = true;
    startPinch();
    return;
  }

  if(isZoomGesture) return; // 핀치 제스처 도중엔 새 선을 시작하지 않음

  isDrawing = true;
  const p = getCanvasPoint(canvas, e);
  currentStroke = {
    mode: eraserOn ? 'erase' : 'draw',
    color: drawColor,
    width: eraserOn ? drawWidth*3 : drawWidth,
    points: [p]
  };
}
function onPointerMove(e){
  if(activePointers.has(e.pointerId)){
    activePointers.set(e.pointerId, wrapPoint(e));
  }

  if(activePointers.size >= 2){
    if(!pinchState) startPinch();
    const pts = Array.from(activePointers.values());
    const [p1, p2] = pts;
    const dist = getDistance(p1, p2);
    const mid = getMidpoint(p1, p2);
    const newScale = Math.max(1, Math.min(4, pinchState.startScale * (dist / pinchState.startDist)));
    boardScale = newScale;
    boardTranslate = {
      x: mid.x - pinchState.contentPoint.x * newScale,
      y: mid.y - pinchState.contentPoint.y * newScale
    };
    clampBoardTranslate();
    applyBoardTransform();
    return;
  }

  if(!isDrawing || !currentStroke) return;
  const canvas = e.target;
  const p = getCanvasPoint(canvas, e);
  currentStroke.points.push(p);
  drawSegment(canvas.getContext('2d'), currentStroke, currentStroke.points.length-2);
}
function onPointerUp(e){
  activePointers.delete(e.pointerId);
  if(activePointers.size < 2){
    pinchState = null;
  }
  if(activePointers.size === 0){
    isZoomGesture = false;
  }

  if(!isDrawing) return;
  isDrawing = false;
  if(currentStroke && currentStroke.points.length>1){
    currentStrokesArray()[wsCurrentPage].push(currentStroke);
  }
  currentStroke = null;
}

function drawSegment(ctx, stroke, fromIdx){
  if(fromIdx<0) fromIdx=0;
  ctx.save();
  ctx.globalCompositeOperation = stroke.mode==='erase' ? 'destination-out' : 'source-over';
  ctx.strokeStyle = stroke.color;
  ctx.lineWidth = stroke.width;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  const a = stroke.points[fromIdx];
  ctx.moveTo(a.x, a.y);
  for(let i=fromIdx+1;i<stroke.points.length;i++){
    ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
  }
  ctx.stroke();
  ctx.restore();
}

function redrawStrokes(){
  const canvas = document.getElementById('drawCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const strokes = currentStrokesArray()[wsCurrentPage] || [];
  strokes.forEach(s=>drawSegment(ctx, s, 0));
}

function undoStroke(){
  const strokes = currentStrokesArray()[wsCurrentPage];
  if(!strokes || strokes.length===0) return;
  strokes.pop();
  redrawStrokes();
}
function clearPage(){
  const strokes = currentStrokesArray();
  if(!strokes[wsCurrentPage] || strokes[wsCurrentPage].length===0) return;
  if(!confirm('이 페이지에 그린 내용을 모두 지울까요?')) return;
  strokes[wsCurrentPage] = [];
  redrawStrokes();
}

function updateSubmitBanner(existing){
  const b = document.getElementById('submitBanner');
  const status = existing && existing.status;
  if(!submittedFlag){
    b.textContent = '아직 제출 전이에요. 다 풀면 "제출하기"를 눌러주세요.';
    b.classList.remove('done','warn');
    return;
  }
  if(status==='needs_revision'){
    b.textContent = '🔁 선생님이 다시 확인해달라고 했어요! 빨간 표시를 확인하고 고쳐서 다시 제출해주세요.';
    b.classList.add('warn'); b.classList.remove('done');
  }else if(status==='confirmed'){
    b.textContent = '✅ 선생님이 확인 완료했어요! 잘했어요.';
    b.classList.add('done'); b.classList.remove('warn');
  }else{
    b.textContent = '📨 제출 완료! 선생님 확인을 기다리고 있어요. (필요하면 계속 고쳐서 다시 제출해도 돼요)';
    b.classList.remove('done','warn');
  }
}

// board-wrap 안에서 이미지 비율을 유지하며 최대한 꽉 차게 표시하고,
// 캔버스/참고 레이어 크기를 이미지 표시 크기와 정확히 맞춘다 (position:absolute + %높이 이슈 회피)
function fitBoard(){
  const img = document.getElementById('pageImage');
  const canvas = document.getElementById('drawCanvas');
  const refImg = document.getElementById('refLayerImg');
  const wrap = document.querySelector('.board-wrap');
  if(!img || !canvas || !wrap || !img.naturalWidth) return;
  const availW = Math.max(50, wrap.clientWidth - 20);
  const availH = Math.max(50, wrap.clientHeight - 20);
  const ratio = img.naturalWidth / img.naturalHeight;
  let w = availW, h = w / ratio;
  if(h > availH){ h = availH; w = h * ratio; }
  img.style.width = w + 'px';
  img.style.height = h + 'px';
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  if(refImg){
    refImg.style.width = w + 'px';
    refImg.style.height = h + 'px';
  }
}
window.addEventListener('resize', ()=>{
  if(document.getElementById('screen-worksheet').classList.contains('active')) fitBoard();
});

// 특정 페이지의 필기(strokes)만 투명 배경 PNG로 추출한다.
// 원본 학습지 이미지는 픽셀을 읽지 않고 크기(naturalWidth/Height)만 참고하므로
// 원격 이미지를 캔버스에 그리지 않아 CORS/캔버스 오염 문제가 발생하지 않는다.
function exportStrokesPNG(strokes, pageUrl){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    img.onload = ()=>{
      const c = document.createElement('canvas');
      c.width = img.naturalWidth; c.height = img.naturalHeight;
      const ctx = c.getContext('2d');
      (strokes||[]).forEach(s=>drawSegment(ctx, s, 0));
      try{
        resolve(c.toDataURL('image/png'));
      }catch(err){
        reject(err);
      }
    };
    img.onerror = ()=>reject(new Error('학습지 이미지 크기를 확인하지 못했어요'));
    img.src = pageUrl;
  });
}

function submitWork(){
  if(appMode==='grading') return submitGrading();
  return submitStudentWork();
}

async function submitStudentWork(){
  const banner = document.getElementById('submitBanner');
  banner.textContent = '제출 처리 중...';
  banner.classList.remove('done','warn');
  try{
    const strokeUrlMap = {};
    const strokeDataOut = {};
    for(let i=0;i<wsPages.length;i++){
      banner.textContent = `제출 처리 중... (${i+1}/${wsPages.length})`;
      const pngDataUrl = await exportStrokesPNG(wsStrokes[i], wsPages[i]);
      const path = `submissions/${wsDate}/${sanitizeKeyPart(selectedStudent)}/strokes${i}_${Date.now()}.png`;
      strokeUrlMap[i] = await uploadDataUrl(path, pngDataUrl);
      strokeDataOut[i] = roundStrokes(wsStrokes[i]);
    }
    const ok = await fsSetDoc(
      'submissions', wsDate+'_'+sanitizeKeyPart(selectedStudent),
      {
        strokePages: strokeUrlMap,
        strokeData: strokeDataOut,
        basePages: wsPages,
        submitted: true,
        status: 'submitted',
        updatedAt: new Date().toISOString(),
        student: selectedStudent
      },
      true
    );
    submittedFlag = ok;
    banner.textContent = ok
      ? '🎉 제출 완료! 수고했어요, ' + selectedStudent + '!'
      : '제출에 실패했어요. 다시 눌러주세요.';
    banner.classList.toggle('done', ok);
  }catch(err){
    console.error(err);
    banner.textContent = '제출 중 오류가 발생했어요. 인터넷 연결을 확인하고 다시 눌러주세요.';
    banner.classList.remove('done');
  }
}

async function submitGrading(){
  const banner = document.getElementById('submitBanner');
  banner.textContent = '채점 내용 저장 중...';
  banner.classList.remove('done','warn');
  try{
    const teacherUrlMap = {};
    const teacherDataOut = {};
    for(let i=0;i<gradingBasePages.length;i++){
      banner.textContent = `저장 중... (${i+1}/${gradingBasePages.length})`;
      const pngDataUrl = await exportStrokesPNG(gradingStrokes[i], gradingBasePages[i]);
      const path = `grading/${gradingDate}/${sanitizeKeyPart(gradingStudent)}/mark${i}_${Date.now()}.png`;
      teacherUrlMap[i] = await uploadDataUrl(path, pngDataUrl);
      teacherDataOut[i] = roundStrokes(gradingStrokes[i]);
    }
    const ok = await fsSetDoc(
      'submissions', gradingDate+'_'+sanitizeKeyPart(gradingStudent),
      {
        teacherStrokePages: teacherUrlMap,
        teacherStrokeData: teacherDataOut,
        teacherUpdatedAt: new Date().toISOString()
      },
      true
    );
    banner.textContent = ok ? '💾 채점 내용 저장 완료!' : '저장에 실패했어요. 다시 눌러주세요.';
    banner.classList.toggle('done', ok);
  }catch(err){
    console.error(err);
    banner.textContent = '저장 중 오류가 발생했어요. 인터넷 연결을 확인하고 다시 눌러주세요.';
    banner.classList.remove('done');
  }
}

async function setGradingStatus(status){
  const banner = document.getElementById('submitBanner');
  const ok = await fsSetDoc(
    'submissions', gradingDate+'_'+sanitizeKeyPart(gradingStudent),
    {status, teacherUpdatedAt:new Date().toISOString()},
    true
  );
  if(!ok){
    banner.textContent = '상태 저장에 실패했어요. 다시 눌러주세요.';
    banner.classList.remove('done','warn');
    return;
  }
  if(status==='confirmed'){
    banner.textContent = '✅ "확인 완료"로 표시했어요!';
    banner.classList.add('done'); banner.classList.remove('warn');
  }else{
    banner.textContent = '🔁 "재제출 필요"로 표시했어요. 학생이 다시 들어오면 안내가 보여요.';
    banner.classList.add('warn'); banner.classList.remove('done');
  }
}
